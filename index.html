<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>七夕心动报名</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at 20% 10%, rgba(255, 166, 193, 0.5), transparent 28%),
        radial-gradient(circle at 80% 20%, rgba(255, 215, 235, 0.45), transparent 24%),
        linear-gradient(135deg, #5b2cff 0%, #b83280 45%, #ff6b9d 100%);
      overflow-x: hidden;
    }

    .page {
      position: relative;
      width: 100%;
      min-height: 100vh;
      padding: 28px 18px 40px;
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .star {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.85);
      animation: twinkle 2.8s infinite ease-in-out;
    }

    .star:nth-child(1) { top: 8%; left: 12%; animation-delay: 0s; }
    .star:nth-child(2) { top: 18%; left: 78%; animation-delay: 0.5s; }
    .star:nth-child(3) { top: 36%; left: 24%; animation-delay: 1s; }
    .star:nth-child(4) { top: 56%; left: 84%; animation-delay: 1.5s; }
    .star:nth-child(5) { top: 72%; left: 16%; animation-delay: 2s; }
    .star:nth-child(6) { top: 88%; left: 68%; animation-delay: 2.4s; }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.5); }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 520px;
      margin: 0 auto;
    }

    .hero {
      text-align: center;
      padding: 28px 12px 20px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      margin-bottom: 16px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(10px);
      font-size: 13px;
    }

    .title {
      font-size: 36px;
      line-height: 1.18;
      letter-spacing: 2px;
      text-shadow: 0 10px 24px rgba(120, 0, 80, 0.35);
    }

    .subtitle {
      margin-top: 12px;
      font-size: 15px;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.88);
    }

    .heart {
      display: inline-block;
      color: #ffd1e4;
      animation: heartbeat 1.4s infinite;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      25% { transform: scale(1.18); }
      45% { transform: scale(0.95); }
      65% { transform: scale(1.12); }
    }

    .card {
      margin-top: 18px;
      padding: 22px;
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.28);
      box-shadow: 0 24px 60px rgba(58, 15, 91, 0.34);
      backdrop-filter: blur(18px);
    }

    .activity-info {
      display: grid;
      gap: 12px;
      margin-bottom: 22px;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.12);
      font-size: 14px;
      color: rgba(255, 255, 255, 0.92);
    }

    .section-title {
      margin-bottom: 16px;
      font-size: 20px;
      font-weight: 700;
    }

    .form {
      display: grid;
      gap: 15px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.9);
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 0;
      outline: none;
      border-radius: 15px;
      padding: 14px 15px;
      color: #5b1b57;
      background: rgba(255, 255, 255, 0.92);
      font-size: 15px;
      font-family: inherit;
    }

    .field textarea {
      min-height: 86px;
      resize: vertical;
    }

    .field input::placeholder,
    .field textarea::placeholder {
      color: #b38cae;
    }

    .chips {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .chip {
      position: relative;
    }

    .chip input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .chip span {
      display: block;
      padding: 12px 10px;
      border-radius: 15px;
      text-align: center;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.9);
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.18);
      transition: all 0.2s ease;
    }

    .chip input:checked + span {
      color: #a21b66;
      background: #fff;
      border-color: #fff;
      box-shadow: 0 10px 22px rgba(255, 210, 232, 0.24);
    }

    .submit-btn {
      width: 100%;
      margin-top: 6px;
      border: 0;
      border-radius: 18px;
      padding: 15px 18px;
      color: #9b145f;
      background: linear-gradient(135deg, #fff 0%, #ffd1e4 100%);
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 1px;
      box-shadow: 0 16px 32px rgba(108, 16, 84, 0.28);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .submit-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .tips {
      margin-top: 14px;
      font-size: 12px;
      line-height: 1.6;
      text-align: center;
      color: rgba(255, 255, 255, 0.65);
    }

    .modal-mask {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(33, 8, 50, 0.62);
      backdrop-filter: blur(10px);
    }

    .modal-mask.show {
      display: flex;
    }

    .modal {
      width: 100%;
      max-width: 360px;
      padding: 28px 22px 24px;
      border-radius: 26px;
      text-align: center;
      color: #5b1b57;
      background: #fff;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.22);
      animation: pop 0.24s ease;
    }

    @keyframes pop {
      from { opacity: 0; transform: scale(0.92) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 14px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, #ff6b9d, #b83280);
      font-size: 30px;
    }

    .modal h3 {
      margin-bottom: 8px;
      font-size: 22px;
    }

    .modal p {
      font-size: 14px;
      line-height: 1.7;
      color: #87607e;
    }

    .modal-btn {
      width: 100%;
      margin-top: 20px;
      border: 0;
      border-radius: 15px;
      padding: 13px 16px;
      color: #fff;
      background: linear-gradient(135deg, #b83280, #ff6b9d);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .footer {
      margin-top: 22px;
      text-align: center;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.65);
    }

    @media (max-width: 640px) {
      .title { font-size: 31px; }
      .card { padding: 18px; }
      .chips { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="stars" aria-hidden="true">
    <span class="star"></span>
    <span class="star"></span>
    <span class="star"></span>
    <span class="star"></span>
    <span class="star"></span>
    <span class="star"></span>
  </div>

  <main class="page">
    <div class="container">
      <section class="hero">
        <div class="badge">限定活动 <span class="heart">♥</span> 浪漫开启</div>
        <h1 class="title">七夕心动报名</h1>
        <p class="subtitle">
          在银河相会的夜晚，赴一场温柔浪漫的约定。<br />
          填写信息，即可锁定你的七夕专属名额。
        </p>
      </section>

      <section class="card">
        <div class="activity-info">
          <div class="info-item">📅 活动时间：2026 年 8 月 19 日 19:30</div>
          <div class="info-item">📍 活动地点：城市浪漫花园广场</div>
          <div class="info-item">🎁 报名福利：限定玫瑰、合影卡、甜品券</div>
        </div>

        <h2 class="section-title">填写报名信息</h2>

        <form class="form" id="signupForm">
          <div class="field">
            <label for="name">姓名</label>
            <input id="name" name="name" type="text" placeholder="请输入你的姓名" required />
          </div>

          <div class="field">
            <label for="phone">手机号</label>
            <input id="phone" name="phone" type="tel" maxlength="11" placeholder="请输入 11 位手机号" required />
          </div>

          <div class="field">
            <label for="people">参与人数</label>
            <select id="people" name="people" required>
              <option value="">请选择参与人数</option>
              <option value="1">1 人</option>
              <option value="2">2 人</option>
              <option value="3">3 人</option>
              <option value="4">4 人</option>
            </select>
          </div>

          <div class="field">
            <label>感兴趣的活动</label>
            <div class="chips">
              <label class="chip">
                <input type="radio" name="interest" value="浪漫晚餐" checked />
                <span>浪漫晚餐</span>
              </label>
              <label class="chip">
                <input type="radio" name="interest" value="星空露营" />
                <span>星空露营</span>
              </label>
              <label class="chip">
                <input type="radio" name="interest" value="情侣手作" />
                <span>情侣手作</span>
              </label>
              <label class="chip">
                <input type="radio" name="interest" value="音乐告白" />
                <span>音乐告白</span>
              </label>
            </div>
          </div>

          <div class="field">
            <label for="message">留言备注</label>
            <textarea id="message" name="message" placeholder="可以写下你的七夕愿望或特殊需求"></textarea>
          </div>

          <button class="submit-btn" type="submit" id="submitBtn">立即报名</button>
        </form>

        <p class="tips">
          提交后工作人员将通过手机号与你联系，请保持电话畅通。
        </p>
      </section>

      <p class="footer">愿所有心动，都在七夕被温柔回应</p>
    </div>
  </main>

  <div class="modal-mask" id="successModal">
    <div class="modal">
      <div class="modal-icon">♥</div>
      <h3>报名成功</h3>
      <p id="successText">你的七夕名额已锁定，期待与你相见！</p>
      <button class="modal-btn" type="button" id="closeModal">知道啦</button>
    </div>
  </div>

  <script>
    const form = document.getElementById('signupForm');
    const modal = document.getElementById('successModal');
    const closeModal = document.getElementById('closeModal');
    const successText = document.getElementById('successText');
    const submitBtn = document.getElementById('submitBtn');

    function isValidPhone(phone) {
      return /^1[3-9]\d{9}$/.test(phone);
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const formData = new FormData(form);
      const data = {
        name: String(formData.get('name') || '').trim(),
        phone: String(formData.get('phone') || '').trim(),
        people: String(formData.get('people') || ''),
        interest: String(formData.get('interest') || ''),
        message: String(formData.get('message') || '').trim()
      };

      if (!data.name) {
        alert('请输入姓名');
        return;
      }

      if (!isValidPhone(data.phone)) {
        alert('请输入正确的手机号');
        return;
      }

      if (!data.people) {
        alert('请选择参与人数');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = '提交中...';

      try {
        // 保存到本地
        let records = [];
        try {
          const stored = localStorage.getItem('qixi_signup_records');
          if (stored) records = JSON.parse(stored);
        } catch (e) {}
        records.unshift({ ...data, createdAt: new Date().toLocaleString('zh-CN') });
        localStorage.setItem('qixi_signup_records', JSON.stringify(records));

        successText.textContent = `${data.name}，你的七夕报名已成功提交！`;
        modal.classList.add('show');
        form.reset();
        const defaultInterest = form.querySelector('input[name="interest"][value="浪漫晚餐"]');
        if (defaultInterest) defaultInterest.checked = true;
      } catch (e) {
        alert('提交失败，请稍后重试');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '立即报名';
      }
    });

    closeModal.addEventListener('click', () => {
      modal.classList.remove('show');
    });

    modal.addEventListener('click', (event) => {
      if (event.target === modal) {
        modal.classList.remove('show');
      }
    });
  </script>
</body>
</html>
